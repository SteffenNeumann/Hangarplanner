<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sync-Problem Reproduktion</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 20px;
			}
			.test-tile {
				border: 1px solid #ccc;
				padding: 20px;
				margin: 10px;
				border-radius: 8px;
			}
			.test-field {
				margin: 10px 0;
			}
			.test-field label {
				display: inline-block;
				width: 120px;
			}
			.test-field input {
				padding: 5px;
				border: 1px solid #ccc;
				border-radius: 4px;
			}
			.test-button {
				padding: 10px 20px;
				margin: 10px;
				background: #007bff;
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
			}
			.test-button:hover {
				background: #0056b3;
			}
			.console-output {
				background: #f8f9fa;
				border: 1px solid #dee2e6;
				padding: 10px;
				margin: 20px 0;
				border-radius: 4px;
				font-family: monospace;
				max-height: 300px;
				overflow-y: auto;
			}
		</style>
	</head>
	<body>
		<h1>🔧 Sync-Problem Test</h1>
		<p>
			Reproduktion des Problems: Arrival Time, Departure Time und Position
			werden nicht synchronisiert, aber Aircraft ID funktioniert.
		</p>

		<div style="display: flex; gap: 20px">
			<div class="test-tile">
				<h3>Test-Tile 1</h3>
				<div class="test-fields">
					<div class="test-field">
						<label for="aircraft-1">Aircraft:</label>
						<input type="text" id="aircraft-1" value="" />
					</div>
					<div class="test-field">
						<label for="arrival-time-1">Arrival Time:</label>
						<input type="text" id="arrival-time-1" value="" />
					</div>
					<div class="test-field">
						<label for="departure-time-1">Departure Time:</label>
						<input type="text" id="departure-time-1" value="" />
					</div>
					<div class="test-field">
						<label for="position-1">Position:</label>
						<input type="text" id="position-1" value="" />
					</div>
				</div>
			</div>

			<div class="test-tile">
				<h3>Test-Tile 2</h3>
				<div class="test-fields">
					<div class="test-field">
						<label for="aircraft-2">Aircraft:</label>
						<input type="text" id="aircraft-2" value="" />
					</div>
					<div class="test-field">
						<label for="arrival-time-2">Arrival Time:</label>
						<input type="text" id="arrival-time-2" value="" />
					</div>
					<div class="test-field">
						<label for="departure-time-2">Departure Time:</label>
						<input type="text" id="departure-time-2" value="" />
					</div>
					<div class="test-field">
						<label for="position-2">Position:</label>
						<input type="text" id="position-2" value="" />
					</div>
				</div>
			</div>
		</div>

		<div class="test-controls">
			<button class="test-button" onclick="runFullAnalysis()">
				🔍 Vollständige Analyse
			</button>
			<button class="test-button" onclick="runQuickTest()">
				⚡ Schnelltest
			</button>
			<button class="test-button" onclick="setTestValues()">
				🧪 Testwerte setzen
			</button>
			<button class="test-button" onclick="testDataCollection()">
				📦 Datensammlung testen
			</button>
			<button class="test-button" onclick="testEventListeners()">
				🎯 Event-Listener testen
			</button>
			<button class="test-button" onclick="clearConsole()">
				🧽 Konsole leeren
			</button>
		</div>

		<div class="console-output" id="consoleOutput">
			Konsolen-Output wird hier angezeigt...<br />
		</div>

		<!-- Originale Hangar Planner JavaScript-Dateien -->
		<script src="js/helpers.js"></script>
		<script src="js/debug-helpers.js"></script>
		<script src="js/fileManager.js"></script>
		<script src="js/weather-api.js"></script>
		<script src="js/hangar-ui.js"></script>
		<script src="js/hangar-data.js"></script>
		<script src="js/aerodatabox-api.js"></script>
		<script src="js/amadeus-api.js"></script>
		<script src="js/opensky-api.js"></script>
		<script src="js/airport-flights.js"></script>
		<script src="js/api-facade.js"></script>
		<script src="js/hangar-events.js"></script>
		<script src="js/hangar-pdf.js"></script>
		<script src="js/hangar.js"></script>
		<script src="js/storage-browser.js"></script>
		<script src="js/sync-diagnosis.js"></script>

		<script>
			// Konsolen-Output umleiten
			const originalLog = console.log;
			const originalError = console.error;
			const originalWarn = console.warn;

			function appendToConsole(message, type = "log") {
				const output = document.getElementById("consoleOutput");
				const timestamp = new Date().toLocaleTimeString();
				const typeColor =
					type === "error" ? "red" : type === "warn" ? "orange" : "black";
				output.innerHTML += `<span style="color: ${typeColor}">[${timestamp}] ${message}</span><br>`;
				output.scrollTop = output.scrollHeight;
			}

			console.log = function (message) {
				originalLog(message);
				appendToConsole(message, "log");
			};

			console.error = function (message) {
				originalError(message);
				appendToConsole(message, "error");
			};

			console.warn = function (message) {
				originalWarn(message);
				appendToConsole(message, "warn");
			};

			// Test-Funktionen
			function runFullAnalysis() {
				if (window.quickSync) {
					window.quickSync.diagnose();
				} else {
					console.error("quickSync nicht verfügbar");
				}
			}

			function runQuickTest() {
				setTestValues();
				setTimeout(() => {
					testDataCollection();
				}, 1000);
			}

			function setTestValues() {
				console.log("🧪 Setze Testwerte...");

				const testValues = {
					"aircraft-1": "D-TEST1",
					"arrival-time-1": "14:30",
					"departure-time-1": "16:45",
					"position-1": "Gate A1",
					"aircraft-2": "D-TEST2",
					"arrival-time-2": "15:15",
					"departure-time-2": "17:20",
					"position-2": "Gate B2",
				};

				Object.entries(testValues).forEach(([elementId, value]) => {
					const element = document.getElementById(elementId);
					if (element) {
						element.value = value;
						// Event manuell auslösen
						element.dispatchEvent(new Event("input", { bubbles: true }));
						element.dispatchEvent(new Event("change", { bubbles: true }));
						console.log(`✅ ${elementId}: "${value}"`);
					} else {
						console.error(`❌ ${elementId}: Element nicht gefunden`);
					}
				});
			}

			function testDataCollection() {
				console.log("📦 Teste Datensammlung...");

				// Teste storage-browser Datensammlung
				if (
					window.storageBrowser &&
					typeof window.storageBrowser.collectSingleTileData === "function"
				) {
					console.log("✅ StorageBrowser.collectSingleTileData verfügbar");

					const testTileId = 1;
					const collectedData =
						window.storageBrowser.collectSingleTileData(testTileId);

					console.log(`Gesammelte Daten für Tile ${testTileId}:`);
					console.log(`  Aircraft ID: "${collectedData.aircraftId}"`);
					console.log(`  Arrival Time: "${collectedData.arrivalTime}"`);
					console.log(`  Departure Time: "${collectedData.departureTime}"`);
					console.log(
						`  Position Info Grid: "${collectedData.positionInfoGrid}"`
					);

					// Teste auch Tile 2
					const collectedData2 = window.storageBrowser.collectSingleTileData(2);
					console.log(`Gesammelte Daten für Tile 2:`);
					console.log(`  Aircraft ID: "${collectedData2.aircraftId}"`);
					console.log(`  Arrival Time: "${collectedData2.arrivalTime}"`);
					console.log(`  Departure Time: "${collectedData2.departureTime}"`);
					console.log(
						`  Position Info Grid: "${collectedData2.positionInfoGrid}"`
					);
				} else {
					console.error(
						"❌ StorageBrowser.collectSingleTileData nicht verfügbar"
					);
				}
			}

			function testEventListeners() {
				console.log("🎯 Teste Event-Listener...");

				const fieldPrefixes = [
					"aircraft-",
					"arrival-time-",
					"departure-time-",
					"position-",
				];

				fieldPrefixes.forEach((prefix) => {
					const testElement = document.querySelector(`[id^="${prefix}"]`);
					if (testElement) {
						console.log(`${prefix}: Element gefunden - ${testElement.id}`);

						// Teste Event-Listener
						const hasInputListener = testElement.oninput !== null;
						const hasChangeListener = testElement.onchange !== null;
						console.log(`  Input Event: ${hasInputListener ? "✅" : "❌"}`);
						console.log(`  Change Event: ${hasChangeListener ? "✅" : "❌"}`);

						// Teste manuelles Event auslösen
						testElement.value = "TEST-VALUE";
						testElement.dispatchEvent(new Event("input", { bubbles: true }));
						console.log(`  Event ausgelöst für: ${testElement.id}`);
					} else {
						console.error(`❌ ${prefix}: Kein Element gefunden`);
					}
				});
			}

			function clearConsole() {
				document.getElementById("consoleOutput").innerHTML =
					"Konsole geleert...<br>";
			}

			// Initial-Test
			document.addEventListener("DOMContentLoaded", function () {
				console.log("🔧 Sync-Problem Test geladen");
				console.log("📋 Verfügbare Funktionen:");
				console.log("  - runFullAnalysis(): Vollständige Analyse");
				console.log("  - setTestValues(): Testwerte in Felder einsetzen");
				console.log("  - testDataCollection(): Datensammlung testen");
				console.log("  - testEventListeners(): Event-Listener testen");

				// Warte kurz und teste dann automatisch die Grundfunktionen
				setTimeout(() => {
					console.log("\n🧪 AUTOMATISCHER INITIALTEST:");
					testEventListeners();
				}, 2000);
			});
		</script>
	</body>
</html>
